name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Install gettext
        run: |
          sudo apt update
          sudo apt install -y gettext

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Check translations
        run: |
          for lang in en zh_CN zh_TW ja de ko ru; do
            catalog="po/$lang/LC_MESSAGES/clipsneko-installer.po"
            msgfmt --check --check-header -o /dev/null "$catalog"
            msgcmp --use-fuzzy "$catalog" po/clipsneko-installer.pot
          done

      - name: Build release
        run: cargo build --release
